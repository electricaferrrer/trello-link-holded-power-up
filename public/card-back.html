<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holded Info</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 8px;
      font-size: 14px;
      background: transparent;
      color: #172b4d;
    }
    @media (prefers-color-scheme: dark) {
      body { color: #b6c2cf; }
      .label { color: #9fadbc; }
      .value { color: #b6c2cf; }
      .icon-light { display: none; }
      .icon-dark { display: inline-block; }
    }
    .row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
    .row-left { display: flex; align-items: center; gap: 8px; }
    .row-icon { width: 16px; height: 16px; flex-shrink: 0; }
    .label { color: #6b778c; font-size: 12px; }
    .value { font-weight: 500; display: block; }
    .link { color: #0079bf; text-decoration: none; }
    .link:hover { text-decoration: underline; }
    .unlink { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: #de350b; cursor: pointer; margin-left: 8px; white-space: nowrap; background: none; border: none; padding: 0; font-family: inherit; }
    .unlink:hover { text-decoration: underline; }
    .unlink-icon { width: 12px; height: 12px; }
    .empty { color: #6b778c; text-align: center; padding: 12px; }
    .icon-dark { display: none; }
    .icon-light { display: inline-block; }
  </style>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <div id="content"></div>
  <script>
    var HOLDED_CONTACT_URL = 'https://app.holded.com/contacts/';
    var HOLDED_PROJECT_URL = 'https://app.holded.com/projects/p/';

    var CONTACT_SVG_LIGHT = '<svg class="row-icon icon-light" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="#42526e"><path d="M384 48c8.8 0 16 7.2 16 16l0 384c0 8.8-7.2 16-16 16L96 464c-8.8 0-16-7.2-16-16L80 64c0-8.8 7.2-16 16-16l288 0zM96 0C60.7 0 32 28.7 32 64l0 384c0 35.3 28.7 64 64 64l288 0c35.3 0 64-28.7 64-64l0-384c0-35.3-28.7-64-64-64L96 0zM240 248a56 56 0 1 0 0-112 56 56 0 1 0 0 112zm-32 40c-44.2 0-80 35.8-80 80 0 8.8 7.2 16 16 16l192 0c8.8 0 16-7.2 16-16 0-44.2-35.8-80-80-80l-64 0zM512 80c0-8.8-7.2-16-16-16s-16 7.2-16 16l0 64c0 8.8 7.2 16 16 16s16-7.2 16-16l0-64zM496 192c-8.8 0-16 7.2-16 16l0 64c0 8.8 7.2 16 16 16s16-7.2 16-16l0-64c0-8.8-7.2-16-16-16zm16 144c0-8.8-7.2-16-16-16s-16 7.2-16 16l0 64c0 8.8 7.2 16 16 16s16-7.2 16-16l0-64z"/></svg>';
    var CONTACT_SVG_DARK = '<svg class="row-icon icon-dark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="#ffffff"><path d="M384 48c8.8 0 16 7.2 16 16l0 384c0 8.8-7.2 16-16 16L96 464c-8.8 0-16-7.2-16-16L80 64c0-8.8 7.2-16 16-16l288 0zM96 0C60.7 0 32 28.7 32 64l0 384c0 35.3 28.7 64 64 64l288 0c35.3 0 64-28.7 64-64l0-384c0-35.3-28.7-64-64-64L96 0zM240 248a56 56 0 1 0 0-112 56 56 0 1 0 0 112zm-32 40c-44.2 0-80 35.8-80 80 0 8.8 7.2 16 16 16l192 0c8.8 0 16-7.2 16-16 0-44.2-35.8-80-80-80l-64 0zM512 80c0-8.8-7.2-16-16-16s-16 7.2-16 16l0 64c0 8.8 7.2 16 16 16s16-7.2 16-16l0-64zM496 192c-8.8 0-16 7.2-16 16l0 64c0 8.8 7.2 16 16 16s16-7.2 16-16l0-64c0-8.8-7.2-16-16-16zm16 144c0-8.8-7.2-16-16-16s-16 7.2-16 16l0 64c0 8.8 7.2 16 16 16s16-7.2 16-16l0-64z"/></svg>';

    var PROJECT_SVG_LIGHT = '<svg class="row-icon icon-light" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" fill="#42526e"><path d="M384 80c8.8 0 16 7.2 16 16l0 64c0 8.8-7.2 16-16 16L64 176c-8.8 0-16-7.2-16-16l0-64c0-8.8 7.2-16 16-16l320 0zM64 32C28.7 32 0 60.7 0 96l0 64c0 35.3 28.7 64 64 64l8 0 0 96c0 48.6 39.4 88 88 88l32 0 0 8c0 35.3 28.7 64 64 64l128 0c35.3 0 64-28.7 64-64l0-64c0-35.3-28.7-64-64-64l-128 0c-35.3 0-64 28.7-64 64l0 8-32 0c-22.1 0-40-17.9-40-40l0-96 264 0c35.3 0 64-28.7 64-64l0-64c0-35.3-28.7-64-64-64L64 32zM384 336c8.8 0 16 7.2 16 16l0 64c0 8.8-7.2 16-16 16l-128 0c-8.8 0-16-7.2-16-16l0-64c0-8.8 7.2-16 16-16l128 0z"/></svg>';
    var PROJECT_SVG_DARK = '<svg class="row-icon icon-dark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" fill="#ffffff"><path d="M384 80c8.8 0 16 7.2 16 16l0 64c0 8.8-7.2 16-16 16L64 176c-8.8 0-16-7.2-16-16l0-64c0-8.8 7.2-16 16-16l320 0zM64 32C28.7 32 0 60.7 0 96l0 64c0 35.3 28.7 64 64 64l8 0 0 96c0 48.6 39.4 88 88 88l32 0 0 8c0 35.3 28.7 64 64 64l128 0c35.3 0 64-28.7 64-64l0-64c0-35.3-28.7-64-64-64l-128 0c-35.3 0-64 28.7-64 64l0 8-32 0c-22.1 0-40-17.9-40-40l0-96 264 0c35.3 0 64-28.7 64-64l0-64c0-35.3-28.7-64-64-64L64 32zM384 336c8.8 0 16 7.2 16 16l0 64c0 8.8-7.2 16-16 16l-128 0c-8.8 0-16-7.2-16-16l0-64c0-8.8 7.2-16 16-16l128 0z"/></svg>';

    var UNLINK_SVG_LIGHT = '<svg class="unlink-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512" fill="#de350b"><path d="M38.8 5.1C28.4-3.1 13.3-1.2 5.1 9.2S-1.2 34.7 9.2 42.9l592 464c10.4 8.2 25.5 6.3 33.7-4.1s6.3-25.5-4.1-33.7L489.3 358.2l90.5-90.5c56.5-56.5 56.5-148 0-204.5c-56.5-56.5-148-56.5-204.5 0L294.3 144.3l-64-50.2 95.5-95.5c87.5-87.5 229.3-87.5 316.8 0s87.5 229.3 0 316.8l-95.5 95.5-64-50.2 90.5-90.5c56.5-56.5 56.5-148 0-204.5zM116.7 467.5l-90.5 90.5c-56.5 56.5-56.5 148 0 204.5s148 56.5 204.5 0l95.5-95.5 64 50.2-95.5 95.5c-87.5 87.5-229.3 87.5-316.8 0s-87.5-229.3 0-316.8l95.5-95.5 64 50.2z"/></svg>';

    var contentDiv = document.getElementById('content');
    var t = window.TrelloPowerUp.iframe();

    function render() {
      t.get('card', 'shared', 'holdedData')
        .then(function(data) {
          data = data || {};
          var rows = [];

          if (data.contactName) {
            var contactLink = data.contactId
              ? '<a class="value link" href="' + HOLDED_CONTACT_URL + data.contactId + '" target="_blank">' + data.contactName + '</a>'
              : '<div class="value">' + data.contactName + '</div>';
            rows.push(
              '<div class="row">' +
                '<div class="row-left">' + CONTACT_SVG_LIGHT + CONTACT_SVG_DARK +
                  '<div><div class="label">Cliente</div>' + contactLink + '</div>' +
                '</div>' +
                '<button class="unlink" data-field="contact">Desvincular</button>' +
              '</div>'
            );
          }

          if (data.projectName) {
            var projectLink = data.projectId
              ? '<a class="value link" href="' + HOLDED_PROJECT_URL + data.projectId + '" target="_blank">' + data.projectName + '</a>'
              : '<div class="value">' + data.projectName + '</div>';
            rows.push(
              '<div class="row">' +
                '<div class="row-left">' + PROJECT_SVG_LIGHT + PROJECT_SVG_DARK +
                  '<div><div class="label">Proyecto</div>' + projectLink + '</div>' +
                '</div>' +
                '<button class="unlink" data-field="project">Desvincular</button>' +
              '</div>'
            );
          }

          if (rows.length === 0) {
            contentDiv.innerHTML = '<div class="empty">No hay datos vinculados de Holded.</div>';
          } else {
            contentDiv.innerHTML = rows.join('');
          }

          var unlinkBtns = contentDiv.querySelectorAll('.unlink');
          for (var i = 0; i < unlinkBtns.length; i++) {
            unlinkBtns[i].addEventListener('click', function() {
              var field = this.getAttribute('data-field');
              t.get('card', 'shared', 'holdedData').then(function(current) {
                current = current || {};
                if (field === 'contact') {
                  delete current.contactId;
                  delete current.contactName;
                } else {
                  delete current.projectId;
                  delete current.projectName;
                }
                t.set('card', 'shared', 'holdedData', current).then(render);
              });
            });
          }

          t.sizeTo(contentDiv).catch(function() {});
        })
        .catch(function(err) {
          contentDiv.innerHTML = '<div style="color:red;padding:8px;font-size:12px;">Error: ' + err.message + '</div>';
        });
    }

    render();
  </script>
</body>
</html>
