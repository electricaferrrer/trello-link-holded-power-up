<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscar proyecto</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 8px;
      background: transparent;
      color: #172b4d;
    }
    .search-box {
      width: 100%;
      padding: 8px 10px;
      border: none;
      border-radius: 3px;
      font-size: 14px;
      box-sizing: border-box;
      background: #091e420f;
      color: inherit;
      outline: none;
      transition: background 0.2s;
    }
    .search-box:focus {
      background: #fff;
      box-shadow: inset 0 0 0 2px #0079bf;
    }
    .search-box::placeholder { color: #626f86; }
    .results {
      margin-top: 4px;
      max-height: 320px;
      overflow-y: auto;
    }
    .result-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.1s;
    }
    .result-item:hover { background: #091e420f; }
    .result-item:active { background: #091e4224; }
    .result-avatar {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      background: #1b7742;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      text-transform: uppercase;
    }
    .result-info { min-width: 0; }
    .result-name {
      font-size: 14px;
      font-weight: 400;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .result-status {
      font-size: 12px;
      color: #626f86;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .loading, .error, .empty {
      padding: 16px;
      text-align: center;
      color: #626f86;
      font-size: 14px;
    }
    .error { color: #ae2e24; }
    .search-row {
      display: flex;
      gap: 4px;
    }
    .search-row .search-box { flex: 1; }
    .reload-btn {
      position: relative;
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 3px;
      background: #091e420f;
      color: #626f86;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .reload-btn:hover { background: #091e4224; color: #172b4d; }
    .reload-btn:active { transform: scale(0.95); }
    .reload-btn.spinning { animation: spin 0.6s linear; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .reload-btn .tooltip {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: #172b4d;
      color: #fff;
      font-size: 11px;
      line-height: 1.3;
      padding: 6px 8px;
      border-radius: 3px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.97);
      transform-origin: top right;
      transition: opacity 150ms cubic-bezier(0.23, 1, 0.32, 1),
                  transform 150ms cubic-bezier(0.23, 1, 0.32, 1);
    }
    .reload-btn .tooltip::before {
      content: '';
      position: absolute;
      bottom: 100%;
      right: 10px;
      border: 4px solid transparent;
      border-bottom-color: #172b4d;
    }
    .reload-btn:hover .tooltip {
      opacity: 1;
      transform: scale(1);
    }
    .create-btn {
      display: block;
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      border: 1px dashed #091e4224;
      border-radius: 3px;
      background: transparent;
      color: #0079bf;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
      transition: background 0.1s;
    }
    .create-btn:hover { background: #091e420f; }

    @media (prefers-color-scheme: dark) {
      body { color: #b6c2cf; }
      .search-box {
        background: #22272b;
        color: #b6c2cf;
      }
      .search-box:focus {
        background: #22272b;
        box-shadow: inset 0 0 0 2px #579dff;
      }
      .search-box::placeholder { color: #8c9bab; }
      .result-item:hover { background: #a6c5e229; }
      .result-item:active { background: #a6c5e238; }
      .result-status { color: #8c9bab; }
      .loading, .empty { color: #8c9bab; }
      .error { color: #f87168; }
      .reload-btn { background: #a1bdd914; color: #8c9bab; }
      .reload-btn:hover { background: #a6c5e229; color: #b6c2cf; }
      .reload-btn .tooltip { background: #1d2125; color: #b6c2cf; }
      .reload-btn .tooltip::before { border-bottom-color: #1d2125; }
      .create-btn { color: #579dff; border-color: #a6c5e229; }
      .create-btn:hover { background: #a6c5e229; }
    }
  </style>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <div class="search-row">
    <input type="text" class="search-box" id="search" placeholder="Buscar proyecto por nombre..." autofocus />
    <button class="reload-btn" id="reload-btn">↻<span class="tooltip">Recargar lista de proyectos desde Holded</span></button>
  </div>
  <div class="results" id="results"></div>
  <script type="module" src="./search-project.ts"></script>
</body>
</html>
